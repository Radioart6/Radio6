<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Radio 6 - Calendrier</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .calendar-page-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .calendar-box {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .calendar-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }
        .calendar-navigation h3 {
            color: #a855f7;
            font-size: 1.4rem;
            margin: 0;
            text-transform: capitalize;
        }
        .nav-cal-btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-cal-btn:hover {
            background: #9333ea;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }
        .weekday-label {
            font-weight: bold;
            color: #94a3b8;
            padding-bottom: 5px;
            font-size: 0.9rem;
        }
        .day-cell {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 0.75rem 0.25rem;
            min-height: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        .day-cell.empty {
            background-color: transparent;
            border: none;
        }
        .day-cell.active-day {
            color: #fff;
        }
        
        /* --- COULEURS DES ÉVÉNEMENTS --- */
        .day-cell.open-radio {
            border-color: #22c55e;
            background-color: rgba(34, 197, 94, 0.15);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.1);
        }
        .day-cell.open-radio .status-text {
            color: #4ade80;
        }
        
        .day-cell.vacation-or-holiday {
            border-color: #eab308;
            background-color: rgba(234, 179, 8, 0.15);
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.1);
        }
        .day-cell.vacation-or-holiday .status-text {
            color: #fde047;
        }

        .day-cell.special-orange {
            border-color: #f97316;
            background-color: rgba(249, 115, 22, 0.2);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }
        .day-cell.special-orange .status-text {
            color: #ffedd5;
            background-color: #f97316;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .day-cell.closed-red {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }
        .day-cell.closed-red .status-text {
            color: #fee2e2;
            background-color: #ef4444;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .status-text {
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 4px;
            line-height: 1.1;
        }
    </style>
</head>
<body>

    <div id="main-content">
        <header>
            <div class="logo-area">
                <img src="logo.png" alt="Radio 6" class="header-logo">
                <div>
                    <strong class="site-title">RADIO 6</strong><br>
                    <small class="site-subtitle">Lycée Arcisse de Caumont</small>
                </div>
            </div>
            <nav id="main-nav">
    <button id="burger-menu-btn" class="burger-btn" title="Menu">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div id="nav-links" class="nav-links-container">
        <button id="btn-login-open" class="btn-nav-login">Connexion</button>
        <a href="index.html" >Accueil</a>
        <a href="equipe.html">L'Équipe</a>
        <a href="aide.html">Aide</a>
        <a href="calendrier" class="active">🗓️ Calendrier</a>
        <a href="https://www.instagram.com/radio_arcisse/?__pwa=1" target="_blank">Instagram</a>
        <button id="param-btn" class="btn-nav-param" title="Paramètres"><i class="fa-solid fa-gear"></i></button>
    </div>
</nav>
        </header>

        <main>
            <div class="calendar-page-container">
                <div class="calendar-box">
                    <div class="calendar-navigation">
                        <button class="nav-cal-btn" id="btn-prev"><i class="fa-solid fa-chevron-left"></i> Précédent</button>
                        <h3 id="calendar-title">Mois Année</h3>
                        <button class="nav-cal-btn" id="btn-next">Suivant <i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    
                    <div class="calendar-grid" id="calendar-grid-target"></div>
                </div>
            </div>
        </main>

        <footer>
            <p id="footer-text">© 2026 Radio 6 - Espace de rediffusion du Lycée Arcisse de Caumont, Bayeux.</p>
        </footer>
    </div>

    <div id="modal-menu-param" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeParamModal('modal-menu-param')">&times;</span>
            <h3><i class="fa-solid fa-sliders"></i> Réglages Général</h3>
            
            <div class="param-row">
                <label>Thème Visuel :</label>
                <select id="param-media">
                    <option value="dark">Mode Sombre</option>
                    <option value="light">Mode Clair</option>
                </select>
            </div>
            <div class="param-row">
                <label>Taille de la police :</label>
                <select id="param-taille-police">
                    <option value="small">Petite</option>
                    <option value="medium">Normale</option>
                    <option value="large">Grande</option>
                </select>
            </div>
            <div class="param-row">
                <label>Type de police :</label>
                <select id="param-police">
                    <option value="normal">Normale</option>
                    <option value="dyslexic">OpenDyslexic</option>
                </select>
            </div>
            <button class="btn-submit" style="margin-top: 15px; background: #a855f7; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;" onclick="closeParamModal('modal-menu-param')">Enregistrer les réglages</button>
        </div>
    </div>

    <script src="translate-pages.js"></script>
    <script>
        window.openParamModal = function(id) {
            const m = document.getElementById(id);
            if (m) m.classList.remove('hidden');
        };

        window.closeParamModal = function(id) {
            const m = document.getElementById(id);
            if (m) m.classList.add('hidden');
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Liste étendue des mois scolaires couvrant 2025-2026 ET 2026-2027 (Jusqu'à Juillet 2027)
            const moisScolaires = [
                // Année 2025-2026
                { name: "septembre 2025", index: 8, year: 2025 },
                { name: "octobre 2025", index: 9, year: 2025 },
                { name: "novembre 2025", index: 10, year: 2025 },
                { name: "décembre 2025", index: 11, year: 2025 },
                { name: "janvier 2026", index: 0, year: 2026 },
                { name: "février 2026", index: 1, year: 2026 },
                { name: "mars 2026", index: 2, year: 2026 },
                { name: "avril 2026", index: 3, year: 2026 },
                { name: "mai 2026", index: 4, year: 2026 },
                { name: "juin 2026", index: 5, year: 2026 },
                { name: "juillet 2026", index: 6, year: 2026 },
                // Année 2026-2027
                { name: "septembre 2026", index: 8, year: 2026 },
                { name: "octobre 2026", index: 9, year: 2026 },
                { name: "novembre 2026", index: 10, year: 2026 },
                { name: "décembre 2026", index: 11, year: 2026 },
                { name: "janvier 2027", index: 0, year: 2027 },
                { name: "février 2027", index: 1, year: 2027 },
                { name: "mars 2027", index: 2, year: 2027 },
                { name: "avril 2027", index: 3, year: 2027 },
                { name: "mai 2027", index: 4, year: 2027 },
                { name: "juin 2027", index: 5, year: 2027 },
                { name: "juillet 2027", index: 6, year: 2027 }
            ];

            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth();

            let currentMonthPointer = moisScolaires.findIndex(m => m.index === currentMonth && m.year === currentYear);
            if (currentMonthPointer === -1) {
                currentMonthPointer = 0;
            }

            // Vacances scolaires Normandie (Zone B) pour les deux années scolaires
            const vacances = [
                // Année 2025-2026
                { start: new Date('2025-10-18'), end: new Date('2025-11-03'), label: 'Vacances' },
                { start: new Date('2025-12-20'), end: new Date('2025-01-05'), label: 'Vacances' },
                { start: new Date('2025-02-07'), end: new Date('2025-02-23'), label: 'Vacances' },
                { start: new Date('2025-04-04'), end: new Date('2025-04-20'), label: 'Vacances' },
                { start: new Date('2026-07-04'), end: new Date('2026-08-31'), label: 'Vacances' },
                // Année 2026-2027 (Zone B)
                { start: new Date('2026-10-17'), end: new Date('2026-11-02'), label: 'Vacances' },
                { start: new Date('2026-12-19'), end: new Date('2026-01-04'), label: 'Vacances' },
                { start: new Date('2027-02-06'), end: new Date('2027-02-22'), label: 'Vacances' },
                { start: new Date('2027-04-03'), end: new Date('2027-04-19'), label: 'Vacances' },
                { start: new Date('2027-07-03'), end: new Date('2027-08-31'), label: 'Vacances' }
            ];

            // Liste exhaustive des Jours Fériés (2025 à 2027)
            const joursFeries = [
                // 2025
                { date: new Date('2025-11-01'), label: 'Toussaint' },
                { date: new Date('2025-11-11'), label: 'Armistice' },
                { date: new Date('2025-12-25'), label: 'Noël' },
                // 2026
                { date: new Date('2026-01-01'), label: 'Jour de l\'an' },
                { date: new Date('2026-04-06'), label: 'Pâques' },
                { date: new Date('2026-05-01'), label: 'Fête du Travail' },
                { date: new Date('2026-05-08'), label: 'Victoire 1945' },
                { date: new Date('2026-05-14'), label: 'Ascension' },
                { date: new Date('2026-05-25'), label: 'Pentecôte' },
                { date: new Date('2026-07-14'), label: 'Fête Nationale' },
                { date: new Date('2026-11-01'), label: 'Toussaint' },
                { date: new Date('2026-11-11'), label: 'Armistice' },
                { date: new Date('2026-12-25'), label: 'Noël' },
                // 2027
                { date: new Date('2027-01-01'), label: 'Jour de l\'an' },
                { date: new Date('2027-03-29'), label: 'Pâques' },
                { date: new Date('2027-05-01'), label: 'Fête du Travail' },
                { date: new Date('2027-05-06'), label: 'Ascension' },
                { date: new Date('2027-05-08'), label: 'Victoire 1945' },
                { date: new Date('2027-05-17'), label: 'Pentecôte' },
                { date: new Date('2027-07-14'), label: 'Fête Nationale' }
            ];

            const gridTarget = document.getElementById('calendar-grid-target');
            const titleTarget = document.getElementById('calendar-title');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');

            function renderCurrentMonth() {
                const currentMoisData = moisScolaires[currentMonthPointer];
                titleTarget.innerText = currentMoisData.name;
                gridTarget.innerHTML = '';

                const joursSemaine = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
                joursSemaine.forEach(j => {
                    const label = document.createElement('div');
                    label.className = 'weekday-label';
                    label.innerText = j;
                    gridTarget.appendChild(label);
                });

                let firstDayIndex = new Date(currentMoisData.year, currentMoisData.index, 1).getDay();
                firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

                const totalDays = new Date(currentMoisData.year, currentMoisData.index + 1, 0).getDate();

                for (let i = 0; i < firstDayIndex; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'day-cell empty';
                    gridTarget.appendChild(emptyCell);
                }

                for (let day = 1; day <= totalDays; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'day-cell active-day';
                    
                    const dayNum = document.createElement('span');
                    dayNum.innerText = day;
                    cell.appendChild(dayNum);

                    const currentDate = new Date(currentMoisData.year, currentMoisData.index, day);
                    let dayOfWeek = currentDate.getDay();

                    // --- LOGIQUE ÉVÉNEMENTS 2025-2026 UNIQUEMENT ---
                    if (currentMoisData.year === 2026 && currentMoisData.index === 4 && day === 12) {
                        cell.classList.add('special-orange');
                        const status = document.createElement('span');
                        status.className = 'status-text';
                        status.innerText = 'Emission toute la journée';
                        cell.appendChild(status);
                    }
                    else if (currentMoisData.year === 2026 && currentMoisData.index === 5 && day === 9) {
                        cell.classList.add('closed-red');
                        const status = document.createElement('span');
                        status.className = 'status-text';
                        status.innerText = 'web radio fermé';
                        cell.appendChild(status);
                    }
                    else {
                        let raisonJaune = '';

                        // Vérification Jours Fériés
                        for (let jf of joursFeries) {
                            if (currentDate.getFullYear() === jf.date.getFullYear() &&
                                currentDate.getMonth() === jf.date.getMonth() &&
                                currentDate.getDate() === jf.date.getDate()) {
                                raisonJaune = jf.label;
                                break;
                            }
                        }

                        // Vérification Vacances
                        if (!raisonJaune) {
                            for (let v of vacances) {
                                if (currentDate >= v.start && currentDate <= v.end) {
                                    raisonJaune = v.label;
                                    break;
                                }
                            }
                        }

                        if (raisonJaune) {
                            cell.classList.add('vacation-or-holiday');
                            const status = document.createElement('span');
                            status.className = 'status-text';
                            status.innerText = raisonJaune;
                            cell.appendChild(status);
                        } 
                        // Ouverture par défaut récurrente UNIQUEMENT sur la première année 2025-2026
                        else if (currentDate.getFullYear() === 2025 || (currentDate.getFullYear() === 2026 && currentDate.getTime() <= new Date('2026-06-08').getTime())) {
                            if (dayOfWeek === 1 || dayOfWeek === 2) {
                                cell.classList.add('open-radio');
                                const status = document.createElement('span');
                                status.className = 'status-text';
                                status.innerText = 'web radio ouvert';
                                cell.appendChild(status);
                            }
                        }
                    }

                    gridTarget.appendChild(cell);
                }

                btnPrev.style.opacity = currentMonthPointer === 0 ? "0.4" : "1";
                btnPrev.style.pointerEvents = currentMonthPointer === 0 ? "none" : "auto";

                btnNext.style.opacity = currentMonthPointer === moisScolaires.length - 1 ? "0.4" : "1";
                btnNext.style.pointerEvents = currentMonthPointer === moisScolaires.length - 1 ? "none" : "auto";
            }

            btnPrev.addEventListener('click', () => {
                if (currentMonthPointer > 0) {
                    currentMonthPointer--;
                    renderCurrentMonth();
                }
            });

            btnNext.addEventListener('click', () => {
                if (currentMonthPointer < moisScolaires.length - 1) {
                    currentMonthPointer++;
                    renderCurrentMonth();
                }
            });

            renderCurrentMonth();

            // --- LOCAL STORAGE SYNC & RÉGLAGES ---
            const selectMedia = document.getElementById('param-media');
            const selectTaille = document.getElementById('param-taille-police');
            const selectPolice = document.getElementById('param-police');

            if (localStorage.getItem('siteTheme') === 'light') {
                document.body.classList.add('light-mode');
                if(selectMedia) selectMedia.value = "light";
            }
            const pSize = localStorage.getItem('siteFontSize') || 'medium';
            document.body.classList.add(`font-${pSize}`);
            if(selectTaille) selectTaille.value = pSize;

            if (localStorage.getItem('siteFont') === 'dyslexic') {
                document.body.classList.add('font-dyslexic');
                if(selectPolice) selectPolice.value = "dyslexic";
            }

            if(selectMedia) {
                selectMedia.addEventListener('change', (e) => {
                    if(e.target.value === 'light') {
                        document.body.classList.add('light-mode');
                        localStorage.setItem('siteTheme', 'light');
                    } else {
                        document.body.classList.remove('light-mode');
                        localStorage.setItem('siteTheme', 'dark');
                    }
                });
            }

            if(selectTaille) {
                selectTaille.addEventListener('change', (e) => {
                    document.body.classList.remove('font-small', 'font-medium', 'font-large');
                    document.body.classList.add(`font-${e.target.value}`);
                    localStorage.setItem('siteFontSize', e.target.value);
                });
            }

            if(selectPolice) {
                selectPolice.addEventListener('change', (e) => {
                    if(e.target.value === 'dyslexic') {
                        document.body.classList.add('font-dyslexic');
                        localStorage.setItem('siteFont', 'dyslexic');
                    } else {
                        document.body.classList.remove('font-dyslexic');
                        localStorage.setItem('siteFont', 'normal');
                    }
                });
            }
        });
    </script>
</body>
</html>
